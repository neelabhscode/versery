<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f9f9f9" id="versery-theme-color" />
    <script>
      (function () {
        try {
          var k = "versery-theme";
          var t = localStorage.getItem(k);
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
          var m = document.getElementById("versery-theme-color");
          if (m) m.setAttribute("content", t === "dark" ? "#161718" : "#f9f9f9");
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <title>Versery — Curated poetry for quiet reading</title>
